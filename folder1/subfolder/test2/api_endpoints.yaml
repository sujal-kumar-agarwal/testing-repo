api_endpoints:
  base_url: https://api.example.com
  version: v1
  endpoints:
    - path: /users
      methods: [GET, POST, PUT, DELETE]
      auth_required: true
    - path: /products
      methods: [GET, POST]
      auth_required: false
    - path: /orders
      methods: [GET, POST]
      auth_required: true
  rate_limit:
    requests_per_minute: 60
    burst: 100
