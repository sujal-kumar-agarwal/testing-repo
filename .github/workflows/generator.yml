name: Update Guide.md
 
on:
  pull_request:
    types: [opened, synchronize]
 
jobs:
  update-guide:
    runs-on: ubuntu-latest
 
    permissions:
      contents: write
      pull-requests: write
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y
 
      - name: Get changed files
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }} > changed_files.txt
 
      - name: Collect repository structure
        run: |
          find src -type f > repo_files.txt || echo "No src folder"
 
      - name: Generate guide.md with Copilot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PROMPT=$(cat <<EOF
         You are generating documentation for a Vue.js repository.
          
         Create a file called guide.md summarizing the project so an AI assistant
         can answer questions without scanning the entire repository.
          
         Structure:
          
         # Project Guide
         ## Overview
         ## Application Structure
         ## Menus and Features
         ## Key Components
         ## Routing Map
         ## State Management
         ## API Integrations
         ## Important Workflows
          
         Changed files:
         $(cat changed_files.txt)
          
         Repository files:
         $(cat repo_files.txt)
          
         Produce a structured markdown document.
         EOF
         )
 
          gh copilot ask "$PROMPT" > guide.md
 
      - name: Commit guide.md
        run: |
          git config user.name "guide-bot"
          git config user.email "guide-bot@github.com"
 
          git add guide.md
          git commit -m "Auto-update guide.md based on PR changes" || echo "No changes"
 
          git push origin HEAD:${{ github.head_ref }}
