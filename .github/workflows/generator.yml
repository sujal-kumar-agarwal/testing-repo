name: Copilot Guide Generator
 
on:
  pull_request:
    types: [opened, synchronize]
 
permissions:
  contents: write
  pull-requests: write
  id-token: write
 
jobs:
  generate-guide:
    # prevent loops if bots commit
    if: |
      github.actor != 'github-actions[bot]' &&
      github.actor != 'github-copilot[bot]'
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
 
      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y
 
      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
 
      - name: Verify authentication
        run: gh auth status
 
      - name: Generate PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > pr.diff
 
      - name: Run Copilot Coding Agent
        run: |
          gh agent-task create "
          Repository: ${{ github.repository }}
 
          Pull Request: #${{ github.event.pull_request.number }}
 
          Context:
          This repository is a Vue.js frontend application.
 
          The repository contains pages, components, menus,
          API calls and state management.
 
          Purpose of this task:
          Maintain a structured documentation file called guide.md.
 
          guide.md is consumed by an AI assistant so it can answer
          user questions about the application without scanning
          the entire repository.
 
          Analyze the repository and the pull request diff.
 
          File containing changes:
          pr.diff
 
          Update guide.md accordingly.
 
          The guide must follow this structure:
 
          # Application Guide
 
          ## Overview
          Short explanation of what the application does.
 
          ## Navigation / Menus
          List main menus and routes.
 
          ## Pages
          For each page include:
          - route
          - file path
          - purpose
          - user actions available
 
          ## Components
          Important reusable components and where they are used.
 
          ## API Interactions
          Which endpoints are used and by which pages.
 
          ## Stores / State
          Vuex or Pinia stores and what they manage.
 
          Rules:
          - Use clear markdown headings
          - Include file paths
          - Do NOT include code blocks
          - Keep explanations concise
          - Optimize for AI readability
          - Update existing guide.md if it exists
 
          Commit the updated guide.md to the pull request branch.
 
          If the pull request does not affect documentation,
          do nothing.
          "
