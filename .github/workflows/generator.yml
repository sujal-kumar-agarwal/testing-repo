name: Update Guide.md
 
on:
  pull_request:
    types: [opened, synchronize]
 
jobs:
  update-guide:
    runs-on: ubuntu-latest
 
    permissions:
      contents: write
      pull-requests: write
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y
 
      - name: Install Copilot CLI extension
        run: |
          gh extension install github/gh-copilot
 
      - name: Authenticate GH CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
 
      - name: Get changed files
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }} > changed_files.txt
 
      - name: Collect repository structure
        run: |
          find src -type f > repo_files.txt || echo "No src folder"
 
      - name: Generate guide.md with Copilot
        run: |
          PROMPT=$(cat <<EOF
          You are generating documentation for a Vue.js repository.
          Create a file called guide.md summarizing the project so an AI agent
          can answer questions without scanning the whole repository.
           
          Use this structure:
           
          # Project Guide
           
          ## Overview
          Explain the purpose of the application.
           
          ## Application Structure
          Describe folders and architecture.
           
          ## Menus and Features
          Explain main UI sections and what they do.
           
          ## Key Components
          Important Vue components and their purpose.
           
          ## Routing Map
          Main routes and pages.
           
          ## State Management
          Vuex or Pinia stores.
           
          ## API Integrations
          External APIs used.
           
          ## Important Workflows
          Key user flows.
           
          Changed files in this PR:
          $(cat changed_files.txt)
           
          Repository files:
          $(cat repo_files.txt)
           
          Produce a clear structured markdown document.
          EOF
          )
 
          gh copilot ask "$PROMPT" > guide.md
 
      - name: Commit guide.md
        run: |
          git config user.name "guide-bot"
          git config user.email "guide-bot@github.com"
 
          git add guide.md
          git commit -m "Auto-update guide.md based on PR changes" || echo "No changes"
 
          git push origin HEAD:${{ github.head_ref }}
