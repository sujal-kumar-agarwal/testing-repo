name: Notify Teams on Push
 
on:
  push:
    branches:
      - '**'
 
jobs:
  notify:
    runs-on: ubuntu-latest
 
    steps:
      - name: Extract push details
        id: extract
        run: |
          AUTHOR_NAME=$(jq -r '.pusher.name' "$GITHUB_EVENT_PATH")
          AUTHOR_EMAIL=$(jq -r '.pusher.email' "$GITHUB_EVENT_PATH")
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
 
          COMMIT_MESSAGES=$(jq -r '.commits[].message' "$GITHUB_EVENT_PATH")
 
          FILES_CHANGED=$(jq -r '
            .commits[]
            | (.added // [] + .modified // [] + .removed // [])
            | .[]
          ' "$GITHUB_EVENT_PATH" | sort -u)
 
          COMMIT_URL=$(jq -r '.compare' "$GITHUB_EVENT_PATH")
 
          echo "author_name<<EOF" >> $GITHUB_OUTPUT
          echo "$AUTHOR_NAME" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
 
          echo "author_email<<EOF" >> $GITHUB_OUTPUT
          echo "$AUTHOR_EMAIL" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
 
          echo "branch<<EOF" >> $GITHUB_OUTPUT
          echo "$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
 
          echo "commit_messages<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MESSAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
 
          echo "files_changed<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES_CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
 
          echo "commit_url=$COMMIT_URL" >> $GITHUB_OUTPUT
 
      - name: Send Adaptive Card to Microsoft Teams
        run: |
          jq -n \
          --arg author "${{ steps.extract.outputs.author_name }}" \
          --arg email "${{ steps.extract.outputs.author_email }}" \
          --arg branch "${{ steps.extract.outputs.branch }}" \
          --arg commits "${{ steps.extract.outputs.commit_messages }}" \
          --arg files "${{ steps.extract.outputs.files_changed }}" \
          --arg url "${{ steps.extract.outputs.commit_url }}" \
          '{
            type: "message",
            attachments: [
              {
                contentType: "application/vnd.microsoft.card.adaptive",
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.5",
                  body: [
                    {
                      type: "FactSet",
                      facts: [
                        { title: "Author", value: $author },
                        { title: "Email", value: $email },
                        { title: "Branch", value: $branch }
                      ]
                    },
                    {
                      type: "TextBlock",
                      text: "Commit Messages",
                      weight: "Bolder",
                      wrap: true
                    },
                    {
                      type: "TextBlock",
                      text: $commits,
                      wrap: true
                    },
                    {
                      type: "TextBlock",
                      text: "Files Changed",
                      weight: "Bolder",
                      wrap: true
                    },
                    {
                      type: "TextBlock",
                      text: $files,
                      wrap: true
                    }
                  ],
                  actions: [
                    {
                      type: "Action.OpenUrl",
                      title: "View Commits",
                      url: $url
                    }
                  ]
                }
              }
            ]
          }' | curl -X POST -H "Content-Type: application/json" -d @- \
          "${{ secrets.TEAMS_WEBHOOK_URL }}"
