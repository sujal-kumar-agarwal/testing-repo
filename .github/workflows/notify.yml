name: Notify Teams on Push
 
on:
  push:
    branches:
      - '**'   # all branches
 
jobs:
  notify:
    runs-on: ubuntu-latest
 
    steps:
      - name: Send push details to Microsoft Teams
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          AUTHOR_NAME="${{ github.event.head_commit.author.name }}"
          AUTHOR_EMAIL="${{ github.event.head_commit.author.email }}"
          BRANCH_NAME="${{ github.ref_name }}"
          COMMIT_MESSAGE=$(echo "${{ github.event.head_commit.message }}" | sed 's/"/\\"/g')
 
          ADDED_FILES=$(printf "%s\n" "${{ join(github.event.head_commit.added, '\n') }}")
          MODIFIED_FILES=$(printf "%s\n" "${{ join(github.event.head_commit.modified, '\n') }}")
          REMOVED_FILES=$(printf "%s\n" "${{ join(github.event.head_commit.removed, '\n') }}")
 
          curl -X POST "$TEAMS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"🚀 *GitHub Push Notification*\\n\\n\
              **Author:** ${AUTHOR_NAME} (${AUTHOR_EMAIL})\\n\
              **Branch:** ${BRANCH_NAME}\\n\\n\
              **Commit Message:**\\n${COMMIT_MESSAGE}\\n\\n\
              **Files Added:**\\n${ADDED_FILES:-None}\\n\\n\
              **Files Modified:**\\n${MODIFIED_FILES:-None}\\n\\n\
              **Files Removed:**\\n${REMOVED_FILES:-None}\"
            }"
