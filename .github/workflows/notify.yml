name: Push Notification to MS Teams
 
on:
  push:
    branches:
      - dev
    paths:
      - folder1/**
 
jobs:
  notify-teams:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get changed files with status
        id: files
        run: |
          ADDED=$(git diff --name-only --diff-filter=A ${{ github.event.before }} ${{ github.event.after }} | head -10 | paste -sd "," -)
          MODIFIED=$(git diff --name-only --diff-filter=M ${{ github.event.before }} ${{ github.event.after }} | head -10 | paste -sd "," -)
          DELETED=$(git diff --name-only --diff-filter=D ${{ github.event.before }} ${{ github.event.after }} | head -10 | paste -sd "," -)
          
          [ -z "$ADDED" ] && ADDED="None"
          [ -z "$MODIFIED" ] && MODIFIED="None"
          [ -z "$DELETED" ] && DELETED="None"
          
          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
          echo "deleted=$DELETED" >> $GITHUB_OUTPUT
      
      - name: Build commit messages
        id: commits
        env:
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
        run: |
          COMMIT_MESSAGES=$(echo "$COMMITS_JSON" | jq -r '.[] | "- " + .message' | head -10)
          if [ -z "$COMMIT_MESSAGES" ]; then
            COMMIT_MESSAGES="${{ github.event.head_commit.message }}"
          fi
          echo "messages<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MESSAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Send to Teams
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          COMMIT_MSG=$(echo '${{ steps.commits.outputs.messages }}' | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          
          curl -H "Content-Type: application/json" -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"http://schema.org/extensions\",
            \"themeColor\": \"0076D7\",
            \"summary\": \"Push to ${{ github.repository }}\",
            \"sections\": [{
              \"activityTitle\": \"Push to ${{ github.repository }}\",
              \"activitySubtitle\": \"${{ github.event.pusher.name }}\",
              \"facts\": [
                {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\"},
                {\"name\": \"Author\", \"value\": \"${{ github.event.head_commit.author.name }}\"},
                {\"name\": \"Commits\", \"value\": \"$COMMIT_MSG\"},
                {\"name\": \"Added\", \"value\": \"${{ steps.files.outputs.added }}\"},
                {\"name\": \"Modified\", \"value\": \"${{ steps.files.outputs.modified }}\"},
                {\"name\": \"Deleted\", \"value\": \"${{ steps.files.outputs.deleted }}\"}
              ],
              \"markdown\": true
            }],
            \"potentialAction\": [{
              \"@type\": \"OpenUri\",
              \"name\": \"View Commit\",
              \"targets\": [{\"os\": \"default\", \"uri\": \"${{ github.event.head_commit.url }}\"}]
            }]
          }" "$WEBHOOK_URL"
