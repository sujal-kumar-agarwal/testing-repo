name: Push Notification to MS Teams
 
on:
  push:
    branches:
      - '**'
 
jobs:
  notify-teams:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get changed files
        id: files
        run: |
          FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | head -20 | paste -sd "," -)
          if [ -z "$FILES" ]; then
            FILES="No files changed"
          fi
          echo "list=$FILES" >> $GITHUB_OUTPUT
      
      - name: Send to Teams
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" -d '{
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": "0076D7",
            "summary": "Push to ${{ github.repository }}",
            "sections": [{
              "activityTitle": "Push to ${{ github.repository }}",
              "activitySubtitle": "${{ github.event.pusher.name }}",
              "facts": [
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Author", "value": "${{ github.event.head_commit.author.name }} (${{ github.event.head_commit.author.email }})"},
                {"name": "Commit", "value": "${{ github.event.head_commit.message }}"},
                {"name": "Files", "value": "${{ steps.files.outputs.list }}"}
              ],
              "markdown": true
            }],
            "potentialAction": [{
              "@type": "OpenUri",
              "name": "View Commit",
              "targets": [{"os": "default", "uri": "${{ github.event.head_commit.url }}"}]
            }]
          }' "$WEBHOOK_URL"
 
