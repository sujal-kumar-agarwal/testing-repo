name: Send GitHub push details to Teams
 
on:
  push:
    branches:
      - '**'
 
jobs:
  notify:
    runs-on: ubuntu-latest
 
    steps:
      - name: Send Adaptive Card to Microsoft Teams
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          AUTHOR_NAME="${{ github.event.head_commit.author.name }}"
          AUTHOR_EMAIL="${{ github.event.head_commit.author.email }}"
          BRANCH_NAME="${{ github.ref_name }}"
          REPO_NAME="${{ github.repository }}"
          COMPARE_URL="${{ github.event.compare }}"
 
          # Aggregate commit messages across all commits
          COMMIT_MESSAGES=$(jq -r '[.commits[].message] | .[]' <<< '${{ toJson(github.event) }}')
 
          # Aggregate files across all commits
          ADDED_FILES=$(jq -r '[.commits[].added[]] | unique | .[]?' <<< '${{ toJson(github.event) }}')
          MODIFIED_FILES=$(jq -r '[.commits[].modified[]] | unique | .[]?' <<< '${{ toJson(github.event) }}')
          REMOVED_FILES=$(jq -r '[.commits[].removed[]] | unique | .[]?' <<< '${{ toJson(github.event) }}')
 
          curl -X POST "$TEAMS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"message\",
              \"attachments\": [
                {
                  \"contentType\": \"application/vnd.microsoft.card.adaptive\",
                  \"content\": {
                    \"\$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\",
                    \"type\": \"AdaptiveCard\",
                    \"version\": \"1.4\",
                    \"body\": [
                      {
                        \"type\": \"FactSet\",
                        \"facts\": [
                          { \"title\": \"Repository\", \"value\": \"${REPO_NAME}\" },
                          { \"title\": \"Branch\", \"value\": \"${BRANCH_NAME}\" },
                          { \"title\": \"Author\", \"value\": \"${AUTHOR_NAME} (${AUTHOR_EMAIL})\" }
                        ]
                      },
                      {
                        \"type\": \"TextBlock\",
                        \"text\": \"Commit messages\",
                        \"weight\": \"Bolder\",
                        \"spacing\": \"Medium\"
                      },
                      {
                        \"type\": \"TextBlock\",
                        \"text\": \"$(printf '%s\n' "$COMMIT_MESSAGES")\",
                        \"wrap\": true
                      },
                      {
                        \"type\": \"TextBlock\",
                        \"text\": \"Files added\",
                        \"weight\": \"Bolder\",
                        \"spacing\": \"Medium\"
                      },
                      {
                        \"type\": \"TextBlock\",
                        \"text\": \"$(printf '%s\n' "$ADDED_FILES")\",
                        \"wrap\": true
                      },
                      {
                        \"type\": \"TextBlock\",
                        \"text\": \"Files modified\",
                        \"weight\": \"Bolder\",
                        \"spacing\": \"Medium\"
                      },
                      {
                        \"type\": \"TextBlock\",
                        \"text\": \"$(printf '%s\n' "$MODIFIED_FILES")\",
                        \"wrap\": true
                      },
                      {
                        \"type\": \"TextBlock\",
                        \"text\": \"Files removed\",
                        \"weight\": \"Bolder\",
                        \"spacing\": \"Medium\"
                      },
                      {
                        \"type\": \"TextBlock\",
                        \"text\": \"$(printf '%s\n' "$REMOVED_FILES")\",
                        \"wrap\": true
                      }
                    ],
                    \"actions\": [
                      {
                        \"type\": \"Action.OpenUrl\",
                        \"title\": \"View changes\",
                        \"url\": \"${COMPARE_URL}\"
                      }
                    ]
                  }
                }
              ]
            }"
 
