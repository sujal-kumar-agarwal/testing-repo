name: Push Notification to MS Teams
 
on:
  push:
    branches:
      - '**'
 
jobs:
  notify-teams:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get all changed files across all commits in push
        id: changed-files
        run: |
          FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | tr '\n' ', ' | sed 's/,$//')
          echo "files=$FILES" >> $GITHUB_OUTPUT
      
      - name: Send to Teams
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "Push to ${{ github.repository }}",
            "themeColor": "0078D4",
            "title": "Push Event",
            "sections": [{
              "activityTitle": "${{ github.event.head_commit.message }}",
              "activitySubtitle": "${{ github.event.pusher.name }} (${{ github.event.pusher.email }})",
              "facts": [
                {"name": "Repository", "value": "${{ github.repository }}"},
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Commit", "value": "${{ github.sha }}"},
                {"name": "Author", "value": "${{ github.event.head_commit.author.name }} <${{ github.event.head_commit.author.email }}>"},
                {"name": "Files Changed", "value": "${{ steps.changed-files.outputs.files }}"}
              ]
            }],
            "potentialAction": [{
              "@type": "OpenUri",
              "name": "View Commit",
              "targets": [{"os": "default", "uri": "${{ github.event.head_commit.url }}"}]
            }]
          }
          EOF
          )
          
          curl -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.TEAMS_WEBHOOK_URL }}
